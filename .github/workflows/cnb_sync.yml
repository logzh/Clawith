name: Sync GitHub to CNB

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to CNB repository
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
          CNB_ORG: ${{ vars.CNB_ORG }}
        run: |
          set -euo pipefail

          if [ -z "${CNB_TOKEN}" ]; then
            echo "CNB_TOKEN is required (Settings -> Secrets and variables -> Actions)."
            exit 1
          fi

          ORG_NAME="${CNB_ORG:-${GITHUB_REPOSITORY_OWNER}}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          TARGET_URL="https://cnb.cool/${ORG_NAME}/${REPO_NAME}.git"

          echo "Sync target: ${TARGET_URL}"

          docker run --rm \
            -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
            -w "${GITHUB_WORKSPACE}" \
            -e PLUGIN_TARGET_URL="${TARGET_URL}" \
            -e PLUGIN_AUTH_TYPE="https" \
            -e PLUGIN_USERNAME="cnb" \
            -e PLUGIN_PASSWORD="${CNB_TOKEN}" \
            -e PLUGIN_FORCE="true" \
            tencentcom/git-sync
